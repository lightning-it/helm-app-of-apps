---
config:
  clients:
    - url: http://loki.monitoring:3100/loki/api/v1/push
securityContext:
  runAsUser: 0
  fsGroup: 0
  capabilities:
    add: ["SYS_RESOURCE"]

extraEnv:
  - name: GOMAXPROCS
    value: "1"

command:
  - /bin/sh
  - -c
  - |
    ulimit -n 65535
    exec /usr/bin/promtail -config.file=/etc/promtail/promtail.yaml
