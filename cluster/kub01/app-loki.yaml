---
loki:
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 50Gi
  storage:
    type: filesystem
  auth_enabled: false
  limits_config:
    retention_period: 3d
  commonConfig:
    replication_factor: 1

# Kein Gateway, kein Canary für PoC
gateway:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
