nameOverride: prometheus

# ============================================================
# Alertmanager
# ============================================================
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    secrets:
      - smtp-credentials
    volumes:
      - name: smtp-credentials
        secret:
          secretName: smtp-credentials

  config:
    global:
      smtp_smarthost: "mrx.degert-it.de:588"
      smtp_from: "k8s+secunet-kub01@degert-it.de"
      smtp_auth_username: "secunet-kub01@mrx.degert-it.de"
      smtp_auth_password_file: /etc/alertmanager/secrets/smtp-credentials/password
      smtp_require_tls: true
      smtp_tls_config:
        insecure_skip_verify: true
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: email
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: blackhole
    receivers:
      - name: email
        email_configs:
          - to: "deg@l-it.io"
            send_resolved: true
      - name: blackhole  # Watchdog Alert unterdrücken

# ============================================================
# Prometheus
# ============================================================
prometheus:
  enabled: true
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-block
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

# ============================================================
# Grafana
# ============================================================
grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: ceph-block
    size: 10Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.apps.kub01.poc01.cloud.l-it.io
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

  grafana.ini:
    server:
      root_url: https://grafana.apps.kub01.poc01.cloud.l-it.io
    smtp:
      enabled: true

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
      isDefault: false

  # Prometheus explizit als einzige Default-Datasource
  sidecar:
    datasources:
      defaultDatasourceEnabled: true   # Prometheus bleibt default

# ============================================================
# Node Exporter + kube-state-metrics
# ============================================================
prometheus-node-exporter:
  enabled: true

kube-state-metrics:
  enabled: true

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

defaultRules:
  rules:
    kubeControllerManager: false
    kubeScheduler: false
    kubeProxy: false
    etcd: false
    kubeSchedulerAlerting: false
    k8sContainerCpuUsageSecondsTotal: false
  disabled:
    KubeCPUOvercommit: true
