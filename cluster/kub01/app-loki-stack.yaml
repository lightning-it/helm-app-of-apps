---
loki:
  enabled: true
  persistence:
    enabled: true
    storageClassName: ceph-block
    size: 50Gi
  config:
    limits_config:
      retention_period: 3d
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 24h
    chunk_store_config:
      max_look_back_period: 3d
    table_manager:
      retention_deletes_enabled: true
      retention_period: 3d

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki-stack:3100/loki/api/v1/push
