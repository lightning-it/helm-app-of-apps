apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: ovh-public-ips
  namespace: metallb-system
spec:
  addresses:
    # OVH Additional IPs oder aus deinem vRack
    # - 51.195.x.x/32  # Deine öffentliche IP(s)
    # - 51.195.x.y/32
    # Oder aus deinem privaten Netz für intern
    - 10.10.10.100-10.10.10.200
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - ovh-public-ips
