---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-ingress-nginx
  namespace: kube-system
spec:
  valuesContent: |-
    controller:
      service:
        enabled: true
        type: LoadBalancer
        annotations:
          metallb.io/address-pool: apps-pool
        loadBalancerIP: "192.168.122.98"
      ingressClassResource:
        default: true
